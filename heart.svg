<svg width="200" height="200" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 탁함 방지를 위해 중간에 화이트를 섞은 12초 주기 그라데이션 -->
    <linearGradient id="safeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;">
        <animate attributeName="stop-color" 
                 values="#FFB6C1; #FFFFFF; #98FB98; #FFFFFF; #FFB6C1" 
                 dur="12s" 
                 repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#98FB98;">
        <animate attributeName="stop-color" 
                 values="#98FB98; #FFFFFF; #FFB6C1; #FFFFFF; #98FB98" 
                 dur="12s" 
                 repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- 하트 본체: 중심점을 맞추고 크기를 줄여 여백 확보 (4초 주기) -->
  <g transform="translate(150, 150)">
    <path fill="url(#safeGradient)" 
          d="M0 76.1l-13.1-11.9C-59.7 21 -91 -7.4 -91 -42c0-28.2 22.2-50.4 50.4-50.4 15.9 0 31.2 7.4 40.6 19.1 9.4-11.7 24.7-19.1 40.6-19.1 28.2 0 50.4 22.2 50.4 50.4 0 34.6-31.3 63-77.9 106.2L0 76.1z">
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.7; 0.95; 0.7" 
        dur="4s" 
        repeatCount="indefinite" 
        calcMode="spline" 
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    </path>
  </g>
</svg>
